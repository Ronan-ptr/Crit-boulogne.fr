version: '3.8'

# ============================================================
# VARIABLES D'ENVIRONNEMENT GLOBALES
# ============================================================
x-base-path: &base-path /srv/Crit-boulogne.fr

services:

  # ──────────────────────────────────────────────
  # 🌐 SITE WEB STATIQUE
  # ──────────────────────────────────────────────
  website:
    image: nginx:alpine
    container_name: crit_website
    ports:
      - "8088:80"       # Pi:8088 → Conteneur:80 (port 80 libre EN INTERNE au conteneur)
    volumes:
      - /srv/Crit-boulogne.fr/website:/usr/share/nginx/html:ro
    networks:
      - crit_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # 📊 DASHBOARD STREAMLIT
  # ──────────────────────────────────────────────
  dashboard:
    build:
      context: /srv/Crit-boulogne.fr/dashboard
      dockerfile: Dockerfile
    container_name: crit_dashboard
    ports:
      - "8501:8501"     # Pi:8501 → Conteneur:8501
    volumes:
      - /srv/Crit-boulogne.fr/data:/app/data:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - DATA_PATH=/app/data
    networks:
      - crit_network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  #  🗄️ FUTURE STACK : Base de données PostgreSQL (Phase 2 — décommenter quand prêt)
  # ──────────────────────────────────────────────
  # 
  # database:
  #   image: postgres:15-alpine
  #   container_name: crit_database
  #   environment:
  #     POSTGRES_DB: crit_db
  #     POSTGRES_USER: crit_user
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - /srv/Crit-boulogne.fr/db_data:/var/lib/postgresql/data
  #   networks:
  #     - crit_network
  #   restart: unless-stopped

# ============================================================
# RÉSEAU INTERNE
# ============================================================
networks:
  crit_network:
    driver: bridge
